<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; img-src 'self' data: https:; script-src 'self' https:; style-src 'self' 'unsafe-inline' https:;">
    <title>Audikite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@1,200&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; letter-spacing: 0.04em; }
        
        body {
            background-color: #000000;
            height: 100vh; width: 100vw; overflow: hidden; 
            -webkit-user-select: none; user-select: none;
        }

        /* --- THE BACKGROUND GRID (Visible behind the glass) --- */
        .viewport-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            display: flex; justify-content: center;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .scrolling-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr minmax(600px, 50vw) 1fr 1fr; 
            gap: 20px; padding: 0 5vw; 
            width: 100%; max-width: 1400px; 
            animation: slowScrollDown 70s linear infinite;
        }

        .tile {
            width: 130px; height: 130px; background-color: rgba(30, 30, 30, 0.4);
            border-radius: 24px; opacity: 0.5; border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .tile:nth-child(4n+1) { grid-column: 1; transform: translateY(30px); }
        .tile:nth-child(4n+2) { grid-column: 2; transform: translateY(-20px); }
        .tile:nth-child(4n+3) { grid-column: 4; transform: translateY(40px); }
        .tile:nth-child(4n+4) { grid-column: 5; transform: translateY(-10px); }
        .tile:nth-child(odd)  { margin-top: 20px; }

        @keyframes slowScrollDown { 0% { transform: translateY(-50%); } 100% { transform: translateY(0%); } }

        /* --- THE GLASS DOOR (0.4 Opacity Black + Heavy Blur) --- */
        .glass-door {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease; /* Smooth fade out for the glass */
        }

        /* --- THE SPLASH TEXT --- */
        .splash-text {
            font-family: 'Instrument Sans', sans-serif;
            font-weight: 200; /* Ultra-thin */
            font-style: italic;
            font-size: 1.8rem;
            color: #f5f5f5; /* Off-white */
            opacity: 0;
            
            /* Text animation: 2 seconds total */
            animation: breatheText 2s ease-in-out forwards;
        }

        @keyframes breatheText {
            0% { opacity: 0; transform: translateY(5px); }
            25% { opacity: 1; transform: translateY(0); }  /* Fades in quickly (0.5s) */
            75% { opacity: 1; transform: translateY(0); }  /* Holds for 1 full sec */
            100% { opacity: 0; transform: translateY(-5px); } /* Fades out smoothly (0.5s) */
        }

    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="scrolling-grid">
            <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
            <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
            <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
        </div>
    </div>

    <div id="glass-door" class="glass-door">
        <div class="splash-text">"Dedicated to music people!"</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const glassDoor = document.getElementById('glass-door');

            // The text finishes its fade-in/fade-out animation at exactly 2 seconds.
            setTimeout(() => {
                // Now we "open the door" by fading out the blur overlay to 0
                glassDoor.style.opacity = '0';
                
                // Wait 1 more second for the glass to completely clear, revealing the crisp grid, then redirect
                setTimeout(() => {
                    window.location.href = '/home/';
                }, 1000);

            }, 2000); 
        });
    </script>

</body>
</html>
