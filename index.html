<head>

    <style>
        /* =========================================
           BASE & RESET
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #1a1a1a;
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'Instrument Sans', sans-serif;
            -webkit-user-select: none; user-select: none;
            display: flex; justify-content: center; align-items: center;
        }

        /* 3. THE GPU HACK: Forces layers into the graphics card to prevent lag */
        .grid-wrapper, .glass-layer, .center-logo, .brand-text, .wifi-wave {
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        /* The loading curtain */
        #curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 9999;
            transition: opacity 0.4s ease;
        }

        /* =========================================
           BACKGROUND GRID
           ========================================= */
        .grid-wrapper {
            position: absolute; top: -50%; left: -10%; width: 120%; height: 200%;
            z-index: 1; pointer-events: none;
        }

        .is-ready .grid-wrapper { animation: gridLifecycle 5.5s linear forwards; }

        .scrolling-grid {
            display: grid; grid-template-columns: repeat(9, 1fr); 
            gap: 40px; padding: 40px; width: 100%; height: 100%;
            animation: scrollDown 30s linear infinite; 
            will-change: transform;
        }

        .tile {
            width: 100%; aspect-ratio: 1; 
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.02);
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .tile.empty { opacity: 0; border: none; box-shadow: none; background: transparent; }

        .tile img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        @keyframes scrollDown { 0% { transform: translateY(-30%); } 100% { transform: translateY(0%); } }
        @keyframes gridLifecycle { 0%, 9% { opacity: 1; } 27%, 69% { opacity: 0.4; } 81%, 100% { opacity: 0; } }

        /* =========================================
           GLASSMORPHISM LAYER
           ========================================= */
        .glass-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            background: rgba(26, 26, 26, 0.3); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            opacity: 0; pointer-events: none;
        }

        .is-ready .glass-layer { animation: fadeInGlass 1s 0.5s ease-in-out forwards; }
        @keyframes fadeInGlass { to { opacity: 1; } }

        /* =========================================
           CENTER STAGE
           ========================================= */
        .stage-container { position: relative; z-index: 20; display: flex; flex-direction: column; align-items: center; }
        .logo-row { display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        
        .center-logo {
            height: 300px; width: auto; object-fit: contain; opacity: 0;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.7));
        }

        .is-ready .center-logo { animation: popIn 0.5s 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* =========================================
           WIFI WAVES
           ========================================= */
        .wifi-wave { width: 100px; height: 160px; opacity: 0; }
        .is-ready .wifi-wave { animation: wifiPulse 1s 1.5s ease-out forwards; }
        .left-wave { margin-right: 25px; } .right-wave { margin-left: 25px; }
        .wifi-path { fill: none; stroke: rgba(255, 255, 255, 0.7); stroke-width: 5; stroke-linecap: round; }
        @keyframes wifiPulse { 0% { opacity: 0; transform: scale(0.5); } 40% { opacity: 1; } 100% { opacity: 0; transform: scale(1.4); } }

        /* =========================================
           BRAND TEXT
           ========================================= */
        .brand-text { color: #f5f5f5; font-size: 2.5rem; font-weight: 400; opacity: 0; position: relative; margin-top: 50px;}
        .is-ready .brand-text { animation: slideUpFade 0.6s 2.2s ease-out forwards; }
        .brand-text::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px;
            background-color: #14e7fa; box-shadow: 0 0 10px #14e7fa, 0 0 20px rgba(20, 231, 250, 0.5); border-radius: 2px;
        }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        /* =========================================
           FINAL BLACKOUT
           ========================================= */
        .scene-blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; background: #1a1a1a; opacity: 0; pointer-events: none; }
        .is-ready .scene-blackout { animation: finalFadeOut 1s 4.5s ease-in-out forwards; }
        @keyframes finalFadeOut { to { opacity: 1; } }

        /* =========================================
           RESPONSIVE DESIGN & MOBILE GRID
           ========================================= */

        /* TABLET (1024px and below) */
        @media (max-width: 1024px) {
            /* 1. Scale down the center elements */
            .center-logo { height: 200px; }
            .wifi-wave { width: 70px; height: 110px; }
            .left-wave { margin-right: 15px; } 
            .right-wave { margin-left: 15px; }
            .brand-text { font-size: 1.8rem; margin-top: 40px; text-align: center; }

            /* 2. Convert Grid to Horizontal Left-to-Right */
            .grid-wrapper { width: 200%; height: 120%; top: -10%; left: -50%; }
            .scrolling-grid {
                grid-template-columns: repeat(18, 1fr); /* Reflows the 108 tiles wider */
                gap: 20px; padding: 20px;
                animation: scrollRight 30s linear infinite; /* New horizontal animation */
            }
        }

        /* PHONE (768px and below) */
        @media (max-width: 768px) {
            /* 1. Scale down further */
            .center-logo { height: 140px; }
            .wifi-wave { width: 50px; height: 80px; }
            .brand-text { font-size: 1.3rem; margin-top: 30px; padding: 0 20px; }

            /* 2. Make grid icons even smaller and wider */
            .grid-wrapper { width: 300%; left: -100%; }
            .scrolling-grid {
                grid-template-columns: repeat(27, 1fr); /* Even more columns */
                gap: 15px; padding: 15px;
            }
        }

        /* SMALL PHONE (480px and below) */
        @media (max-width: 480px) {
            /* 1. Tiny screen scaling */
            .center-logo { height: 100px; }
            .wifi-wave { width: 35px; height: 60px; margin: 0 10px; }
            .brand-text { font-size: 1.1rem; margin-top: 20px; }

            /* 2. Maximum horizontal stretch for tiny icons */
            .grid-wrapper { width: 400%; left: -150%; }
            .scrolling-grid {
                grid-template-columns: repeat(36, 1fr); /* Super wide, small tiles */
                gap: 10px; padding: 10px;
            }
        }

        /* HORIZONTAL SCROLL ANIMATION (Left to Right) */
        @keyframes scrollRight { 
            0% { transform: translateX(-30%); } 
            100% { transform: translateX(0%); } 
        }

    </style>
</head>

    <script>
        window.onload = () => {
            const curtain = document.getElementById('curtain');
            
            // Step 1: Tell browser to calculate graphics layout
            document.body.classList.add('is-ready');
            
            // Step 2: Fade out the black curtain smoothly to reveal the pre-calculated scene
            setTimeout(() => {
                curtain.style.opacity = '0';
            }, 100);

            // Step 3: Remove the curtain from DOM so it doesn't block clicks
            setTimeout(() => {
                curtain.style.display = 'none';
            }, 500);
            
            // Step 4: Fire redirect exactly 5.5s after scene starts
            setTimeout(() => {
                window.location.href = 'home/home.html';
            }, 5600); // 5.5s + 100ms curtain delay
        };
    </script>
